name: "打包 iPad APP"
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: "下載零件並編譯 (暴力破解版)"
        run: |
          flutter pub get
          # 🌟 關鍵：雖然是模擬器模式，但強制要求編譯 ARM64 結構，這就是 iPad 能跑的祕訣！
          flutter build ios --no-codesign --simulator --dart-define=FLUTTER_XCODE_ONLY_ARCH_QUERY=NO
          
      - name: "產生成品檔案"
        uses: actions/upload-artifact@v4
        with:
          name: TopMath_Pro_App
          path: build/ios/iphonesimulator/Runner.app
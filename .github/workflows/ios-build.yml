name: "打包 iPad APP"
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: "設定 Flutter 環境"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0' # 🌟 指定版本，確保零件完全契合
          
      - name: "清理並下載零件"
        run: |
          flutter clean
          flutter pub get
          
      - name: "強力編譯 (跳過所有驗證)"
        run: |
          # 🌟 加入這行，強迫雲端電腦不要管那些瑣碎的警告
          flutter build ios --release --no-codesign --no-tree-shake-icons
          
      - name: "產生成品檔案"
        uses: actions/upload-artifact@v4
        with:
          name: TopMath_Pro_App
          path: build/ios/iphoneos/Runner.app
name: "打包 iPad APP"
on: [push] # 只要您把程式碼傳上去，雲端就自動開始打包
jobs:
  build:
    runs-on: macos-latest # 借用雲端的 Mac
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build ipa --no-codesign # 產生測試用的安裝包
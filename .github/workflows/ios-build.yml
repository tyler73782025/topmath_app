name: "打包 iPad APP"
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: "正式編譯 (明輝老師專屬版)"
        run: |
          flutter pub get
          # 🌟 核心：注入您的 Team ID，開啟實體機編譯權限
          flutter build ios --release --no-codesign --no-tree-shake-icons \
            --project-name=topmath_app \
            --dart-define=DEVELOPMENT_TEAM=7L9KZBFYZW
          
      - name: "產生成品檔案"
        uses: actions/upload-artifact@v4
        with:
          name: TopMath_Pro_App
          path: build/ios/iphoneos/Runner.app